<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahlil Bros Platformer</title>
    <style>
        /* Reset dan Full Screen */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB;
            /* Warna langit cerah khas Mario */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* UI Overlay (Start & Game Over) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .overlay h1 {
            font-size: 56px;
            margin-bottom: 10px;
            color: #ff3333;
            /* Merah Mario */
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
        }

        .overlay p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #fff;
        }

        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            background-color: #4CAF50;
            /* Hijau Pipa */
            border: 4px solid #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        #gameOverScreen {
            display: none;
        }

        /* Skor */
        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="startScreen" class="overlay">
        <h1>Bahlil Bros</h1>
        <p>A/D atau Kiri/Kanan untuk Berjalan | W atau Spasi untuk Melompat!</p>
        <button id="startBtn">START GAME</button>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1>GAME OVER</h1>
        <p>Skor Akhir: <span id="finalScore">0</span></p>
        <button id="restartBtn">MAIN LAGI</button>
    </div>

    <div id="scoreBoard">Koin: <span id="score">0</span></div>

    <canvas id="gameCanvas"></canvas>

    <audio id="bgMusic" loop>
        <source src="mbg.mp3" type="audio/mpeg">
    </audio>
    <audio id="gameOverSound">
        <source src="hey.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');

        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const bgMusic = document.getElementById('bgMusic');
        const gameOverSound = document.getElementById('gameOverSound');

        let score = 0;
        let isGameRunning = false;
        let animationId;

        // Konstanta Fisika Dasar
        const GRAVITY = 0.6;
        const JUMP_POWER = -12;
        const FRICTION = 0.8;
        const GROUND_HEIGHT = 100; // Tinggi tanah dari bawah layar

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. Pemain (Wajah)
        const player = {
            x: 100, y: 100, width: 50, height: 50,
            dx: 0, dy: 0, speed: 5,
            isGrounded: false
        };
        const playerImage = new Image();
        playerImage.src = 'bahlil.png';

        // 2. Platform (Tanah)
        const platforms = [];

        // 3. Rintangan (Musuh/Paku)
        const obstacles = [];

        // 4. Koin (Score)
        const coins = [];

        // Variabel untuk menggeser layar (Side-scrolling camera)
        let cameraX = 0;

        function initLevel() {
            platforms.length = 0;
            obstacles.length = 0;
            coins.length = 0;
            score = 0;
            scoreElement.innerText = score;
            cameraX = 0;

            player.x = 100;
            player.y = canvas.height - GROUND_HEIGHT - player.height;
            player.dx = 0;
            player.dy = 0;

            // Buat level panjang (Misal 5000 pixel)
            let levelLength = 5000;

            // Tanah dasar (berlubang di beberapa tempat)
            for (let i = 0; i < levelLength; i += 600) {
                if (Math.random() > 0.2 || i === 0) { // 80% kemungkinan tanah utuh, awal pasti utuh
                    platforms.push({ x: i, y: canvas.height - GROUND_HEIGHT, width: 500, height: GROUND_HEIGHT });
                }
            }

            // Platform melayang, musuh, dan koin
            for (let i = 500; i < levelLength; i += 300) {
                // Random Platform melayang
                if (Math.random() > 0.5) {
                    platforms.push({ x: i, y: canvas.height - GROUND_HEIGHT - 150 - Math.random() * 100, width: 100 + Math.random() * 100, height: 20 });
                    // Taruh koin di atas platform
                    coins.push({ x: i + 50, y: canvas.height - GROUND_HEIGHT - 250, radius: 15, collected: false });
                }

                // Random Koin di tanah
                if (Math.random() > 0.3) {
                    coins.push({ x: i + 100, y: canvas.height - GROUND_HEIGHT - 50, radius: 15, collected: false });
                }

                // Random Rintangan (Kotak Merah) di tanah
                if (Math.random() > 0.6) {
                    obstacles.push({ x: i + 200, y: canvas.height - GROUND_HEIGHT - 40, width: 40, height: 40 });
                }
            }
        }

        // Kontrol
        const keys = { right: false, left: false, up: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if ((e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') && player.isGrounded) {
                player.dy = JUMP_POWER;
                player.isGrounded = false;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        });

        function gameOver() {
            isGameRunning = false;
            cancelAnimationFrame(animationId);
            bgMusic.pause();
            bgMusic.currentTime = 0;
            gameOverSound.currentTime = 0;
            gameOverSound.play().catch(e => console.log(e));

            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        function update() {
            if (!isGameRunning) return;

            // Fisika: Gravitasi
            player.dy += GRAVITY;

            // Pergerakan Horizontal
            if (keys.right) player.dx += 1;
            if (keys.left) player.dx -= 1;

            // Gesekan tanah agar tidak meluncur terus
            player.dx *= FRICTION;

            // Terapkan kecepatan sementara
            player.x += player.dx;
            player.y += player.dy;

            // Kamera mengikuti pemain (Batas kiri tidak bisa mundur, batas kanan jalan terus)
            // Kamera menahan player di tengah layar (canvas.width/3)
            if (player.x > cameraX + canvas.width / 3) {
                cameraX = player.x - canvas.width / 3;
            }
            // Batas kiri layar (tidak bisa balik ke belakang kamera)
            if (player.x < cameraX) {
                player.x = cameraX;
                player.dx = 0;
            }

            // Tabrakan dengan Platform (Tanah)
            player.isGrounded = false;
            platforms.forEach(plat => {
                // Karena kita pakai kamera, kita pakai posisi absolut player dan plat
                if (checkCollision(player, plat)) {
                    // Deteksi jatuh dari atas ke platform
                    if (player.dy > 0 && player.y + player.height - player.dy <= plat.y) {
                        player.isGrounded = true;
                        player.dy = 0;
                        player.y = plat.y - player.height;
                    }
                    // Nabrak dari bawah (sundul platform)
                    else if (player.dy < 0 && player.y - player.dy >= plat.y + plat.height) {
                        player.dy = 0;
                        player.y = plat.y + plat.height;
                    }
                    // Nabrak samping (jalan nabrak tembok)
                    else {
                        player.dx = 0;
                        if (keys.right) player.x = plat.x - player.width;
                        if (keys.left) player.x = plat.x + plat.width;
                    }
                }
            });

            // Jatuh ke jurang (Game Over)
            if (player.y > canvas.height) {
                gameOver();
            }

            // Tabrakan dengan Musuh/Rintangan
            obstacles.forEach(obs => {
                if (checkCollision(player, obs)) {
                    gameOver();
                }
            });

            // Ambil Koin
            coins.forEach(coin => {
                if (!coin.collected) {
                    // Pakai bounding box sederhana untuk koin
                    let coinBox = { x: coin.x - coin.radius, y: coin.y - coin.radius, width: coin.radius * 2, height: coin.radius * 2 };
                    if (checkCollision(player, coinBox)) {
                        coin.collected = true;
                        score += 10;
                        scoreElement.innerText = score;
                    }
                }
            });
        }

        function draw() {
            if (!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Geser canvas/kamera
            ctx.save();
            ctx.translate(-cameraX, 0);

            // Gambar Platform (Tanah)
            ctx.fillStyle = '#8B4513'; // Coklat tanah
            platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                // Rumput di atas tanah
                ctx.fillStyle = '#228B22';
                ctx.fillRect(plat.x, plat.y, plat.width, 10);
                ctx.fillStyle = '#8B4513'; // kembalikan warna
            });

            // Gambar Koin
            ctx.fillStyle = '#FFD700';
            coins.forEach(coin => {
                if (!coin.collected) {
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.closePath();
                }
            });

            // Gambar Rintangan (Musuh/Paku Merah)
            ctx.fillStyle = '#ff0000';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // Gambar Karakter Utama
            if (playerImage.complete && playerImage.naturalWidth !== 0) {
                ctx.drawImage(playerImage, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#4287f5';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            ctx.restore(); // Kembalikan kamera
        }

        function gameLoop() {
            update();
            draw();
            if (isGameRunning) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            initLevel();

            gameOverSound.pause();
            bgMusic.volume = 0.5;
            bgMusic.play().catch(e => console.log(e));

            isGameRunning = true;
            gameLoop();
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

    </script>
</body>

</html>
