<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Pac-Man</title>
    <style>
        /* Reset margin & hilangkan scrollbar */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            touch-action: none;
            /* Mencegah layar ter-scroll saat digeser */
        }

        /* Canvas dibuat memenuhi seluruh layar */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Tampilan Skor */
        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        /* Overlay Layar Awal & Game Over */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 26, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .overlay h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .overlay#gameOverScreen h1 {
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        .overlay p {
            color: #aaaaaa;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Tombol */
        button {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            background-color: #1a237e;
            border: 2px solid #5c6bc0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(26, 35, 126, 0.8);
        }

        button:hover {
            background-color: #283593;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(40, 53, 147, 1);
        }

        #gameOverScreen {
            display: none;
        }

        /* VIRTUAL D-PAD UNTUK MOBILE */
        .dpad-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 15;
            /* Jangan tampilkan di awal, biarkan JS atau Media Query yang atur */
        }

        .dpad-row {
            display: flex;
            gap: 40px;
        }

        .d-btn {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            /* Mencegah teks ter-highlight */
            -webkit-user-select: none;
            touch-action: none;
        }

        .d-btn:active,
        .d-btn.active {
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* Sembunyikan D-Pad jika layarnya lebar (Desktop/Laptop) */
        @media (min-width: 768px) {
            .dpad-container {
                display: none;
            }

            .overlay h1 {
                font-size: 48px;
            }

            .overlay p {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div id="startScreen" class="overlay">
        <h1>Bahlil-Man Arena</h1>
        <p>Kumpulkan koin emas dan hindari Monster Merah!<br>(Bisa dimainkan di HP dan PC)</p>
        <button id="startBtn">START GAME</button>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1>GAME OVER</h1>
        <p>Skor Akhir: <span id="finalScore">0</span></p>
        <button id="restartBtn">MAIN LAGI</button>
    </div>

    <div id="scoreBoard">Skor: <span id="score">0</span></div>

    <div class="dpad-container" id="dpadControl">
        <div class="d-btn" id="btnUp">▲</div>
        <div class="dpad-row">
            <div class="d-btn" id="btnLeft">◄</div>
            <div class="d-btn" id="btnRight">►</div>
        </div>
        <div class="d-btn" id="btnDown">▼</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <audio id="bgMusic" loop>
        <source src="mbg.mp3" type="audio/mpeg">
    </audio>
    <audio id="gameOverSound">
        <source src="hey.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');

        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const bgMusic = document.getElementById('bgMusic');
        const gameOverSound = document.getElementById('gameOverSound');

        let score = 0;
        let isGameRunning = false;
        let animationId;

        // Setup Canvas Full Layar
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Sesuaikan jumlah makanan berdasarkan besar layar
            if (isGameRunning && dots.length === 0) initDots();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. Setup Karakter
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: window.innerWidth < 768 ? 40 : 50, // Ukuran karakter sedikit lebih kecil di HP
            speed: window.innerWidth < 768 ? 4 : 5,  // Kecepatan disesuaikan untuk HP
            dx: 0,
            dy: 0
        };

        const playerImage = new Image();
        playerImage.src = 'bahlil.png';

        // 2. Setup Monster
        const monsters = [];
        function initMonsters() {
            monsters.length = 0;
            // Kecepatan monster sedikit lebih lambat di HP agar adil
            let mSpeed1 = window.innerWidth < 768 ? 2.0 : 2.5;
            let mSpeed2 = window.innerWidth < 768 ? 2.5 : 3.0;
            let mSize = window.innerWidth < 768 ? 35 : 40;

            monsters.push({ x: 50, y: 50, size: mSize, speed: mSpeed1 });
            monsters.push({ x: canvas.width - 50, y: canvas.height - 50, size: mSize, speed: mSpeed2 });
        }

        // 3. Setup Makanan (Dots)
        const dots = [];
        // Kurangi jumlah makanan di HP karena layar lebih kecil
        const numDots = window.innerWidth < 768 ? 40 : 80;

        function initDots() {
            dots.length = 0;
            for (let i = 0; i < numDots; i++) {
                dots.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    radius: 5,
                    collected: false
                });
            }
        }

        // 4. Kontrol (Keyboard + Touch)
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, a: false, s: false, d: false
        };

        // KONTROL KEYBOARD (PC)
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key.toLowerCase() === e.key ? e.key : e.key.toLowerCase()] = true;
                if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
                    e.preventDefault();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key.toLowerCase() === e.key ? e.key : e.key.toLowerCase()] = false;
            }
        });

        // KONTROL SENTUH (VIRTUAL D-PAD HP)
        function bindTouchBtn(btnId, keyName) {
            const btn = document.getElementById(btnId);

            // Event saat tombol disentuh
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[keyName] = true;
                btn.classList.add('active');
            }, { passive: false });

            // Event saat sentuhan dilepas
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyName] = false;
                btn.classList.remove('active');
            });

            // Event jika jari keluar dari area tombol
            btn.addEventListener('touchcancel', (e) => {
                keys[keyName] = false;
                btn.classList.remove('active');
            });
        }

        bindTouchBtn('btnUp', 'ArrowUp');
        bindTouchBtn('btnDown', 'ArrowDown');
        bindTouchBtn('btnLeft', 'ArrowLeft');
        bindTouchBtn('btnRight', 'ArrowRight');

        // Logika saat Game Over
        function gameOver() {
            isGameRunning = false;
            cancelAnimationFrame(animationId);

            bgMusic.pause();
            bgMusic.currentTime = 0;

            gameOverSound.currentTime = 0;
            gameOverSound.play().catch(e => console.log(e));

            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        // 5. Update Logika Game
        function update() {
            if (!isGameRunning) return;

            player.dx = 0;
            player.dy = 0;

            if (keys.ArrowLeft || keys.a) player.dx = -player.speed;
            if (keys.ArrowRight || keys.d) player.dx = player.speed;
            if (keys.ArrowUp || keys.w) player.dy = -player.speed;
            if (keys.ArrowDown || keys.s) player.dy = player.speed;

            if (player.dx !== 0 && player.dy !== 0) {
                player.dx *= 0.7071;
                player.dy *= 0.7071;
            }

            player.x += player.dx;
            player.y += player.dy;

            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x + player.size > canvas.width) player.x = canvas.width - player.size;
            if (player.y + player.size > canvas.height) player.y = canvas.height - player.size;

            const playerCenterX = player.x + player.size / 2;
            const playerCenterY = player.y + player.size / 2;

            monsters.forEach(monster => {
                const monsterCenterX = monster.x + monster.size / 2;
                const monsterCenterY = monster.y + monster.size / 2;

                const dx = playerCenterX - monsterCenterX;
                const dy = playerCenterY - monsterCenterY;
                const distance = Math.hypot(dx, dy);

                if (distance > 0) {
                    monster.x += (dx / distance) * monster.speed;
                    monster.y += (dy / distance) * monster.speed;
                }

                if (distance < (player.size / 2) + (monster.size / 2) - 8) {
                    gameOver();
                }
            });

            let allCollected = true;
            dots.forEach(dot => {
                if (!dot.collected) {
                    allCollected = false;
                    const dist = Math.hypot(playerCenterX - dot.x, playerCenterY - dot.y);
                    if (dist < (player.size / 2) + dot.radius) {
                        dot.collected = true;
                        score += 10;
                        scoreElement.innerText = score;
                    }
                }
            });

            if (allCollected) {
                initDots();
            }
        }

        // 6. Menggambar Frame
        function draw() {
            if (!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Makanan
            ctx.fillStyle = '#FFD700';
            dots.forEach(dot => {
                if (!dot.collected) {
                    ctx.beginPath();
                    ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.closePath();
                }
            });

            // Monster
            monsters.forEach(monster => {
                const mx = monster.x + monster.size / 2;
                const my = monster.y + monster.size / 2;

                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.arc(mx, my, monster.size / 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(mx - 8, my - 5, 5, 0, Math.PI * 2);
                ctx.arc(mx + 8, my - 5, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(mx - 8, my - 5, 2, 0, Math.PI * 2);
                ctx.arc(mx + 8, my - 5, 2, 0, Math.PI * 2);
                ctx.fill();
            });

            // Pemain
            if (playerImage.complete && playerImage.naturalWidth !== 0) {
                ctx.drawImage(playerImage, player.x, player.y, player.size, player.size);
            } else {
                ctx.fillStyle = '#4287f5';
                ctx.fillRect(player.x, player.y, player.size, player.size);
            }
        }

        function gameLoop() {
            update();
            draw();
            if (isGameRunning) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            score = 0;
            scoreElement.innerText = score;

            // Reset posisi di tengah
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;

            // Perbarui ukuran jika user resize layar sebelum klik mulai
            player.size = window.innerWidth < 768 ? 40 : 50;
            player.speed = window.innerWidth < 768 ? 4 : 5;

            initDots();
            initMonsters();

            gameOverSound.pause();
            gameOverSound.currentTime = 0;

            bgMusic.volume = 0.5;
            bgMusic.play().catch(e => console.log(e));

            isGameRunning = true;
            gameLoop();
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

    </script>
</body>

</html>
